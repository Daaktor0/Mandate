name: mandate

x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  user: "10001:10001"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  stop_grace_period: 30s

services:
  worker:
    <<: *service-defaults
    image: mandate-worker:local
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
      target: worker
    environment:
      DEMO_MODE: "1"
      QUEUE_BACKEND: memory
    ports:
      - "127.0.0.1:8081:8081"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m,mode=1777
      - /home/mandate/.cache:rw,noexec,nosuid,nodev,size=128m,mode=1777
    mem_limit: 3g
    cpus: "1.5"
    pids_limit: 256
    shm_size: 1g

  renderer:
    <<: *service-defaults
    image: mandate-renderer:local
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
      target: renderer
    environment:
      DEMO_MODE: "1"
    network_mode: none
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
      - /home/mandate/.cache:rw,noexec,nosuid,nodev,size=64m,mode=1777
    mem_limit: 1g
    cpus: "0.5"
    pids_limit: 128
