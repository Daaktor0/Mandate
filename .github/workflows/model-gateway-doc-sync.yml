name: ModelGateway documentation sync

on:
  push:
    branches:
      - agent/phase-2-model-gateway

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/phase-2-model-gateway
          fetch-depth: 0
      - name: Apply asserted documentation updates
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one occurrence, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          readme = Path("services/worker/README.md")
          text = readme.read_text()
          marker = "## ModelGateway boundary"
          if marker not in text:
              anchor = "## Candidate-generation and scoring boundary"
              section = '''## ModelGateway boundary

`mandate_worker.providers.ModelGateway` is the sole model-call boundary. A versioned
`ModelTaskRoute` fixes the model id, prompt-bundle version, task payload allowlist,
provider allowlist, input/output token ceilings and per-call cost ceiling. The caller
also supplies the remaining per-job model budget; responses that exceed any limit fail
before structured output is returned.

Provider payloads contain only task-allowlisted public identifiers and admitted content.
Unknown top-level fields and recursively nested account identity, firm, billing, payment,
letterhead, confidential-matter, credential and secret keys are rejected. Raw fetched
pages, parsed-but-unadmitted text and quarantined binaries have no direct gateway path.

Every provider request carries `zdr=true` plus an explicit provider allowlist. A response
from a provider outside that allowlist raises `NoApprovedCapacity`; there is no silent
fallback. Output is validated against the caller's Pydantic schema, with exactly one
bounded repair retry. Audit output is a typed `AgentRunRecord` containing ids, task,
model/provider, prompt version, token counts, cost, latency, ZDR status, repair status,
success and a stable error code—never prompts, payloads or provider output.

`DEMO_MODE=1` selects the SHA-256-pinned deterministic fixture router and records zero
spend. Live `openrouter` selection requires an injected transport and reviewed route map;
missing routes, missing transport, fixture selection outside demo mode and unknown
bindings fail closed. Production route/provider selection and credentials remain blocked
on B3. Persistence of `AgentRunRecord` moves to the next migration slice.

'''
              if anchor not in text:
                  raise SystemExit("worker README anchor missing")
              readme.write_text(text.replace(anchor, section + anchor, 1))

          replace_once(
              "docs/implementation/BUILD-CHECKLIST.md",
              "Current phase:** 2 — Evidence pipeline (4/13 tasks complete)",
              "Current phase:** 2 — Evidence pipeline (5/13 tasks complete)",
          )
          replace_once(
              "docs/implementation/BUILD-CHECKLIST.md",
              "- [ ] ModelGateway (ADR-005): routing config, ZDR/allowlist params, payload allowlist, schema validation + repair retry, `agent_runs` logging, cost caps (needs B3 for live; fixture ModelRouter for CI)",
              "- [x] ModelGateway (ADR-005): versioned routing, ZDR/provider allowlists, recursive payload allowlist, one repair retry, typed `AgentRunRecord` audit fields and per-call/per-job cost caps; deterministic zero-spend fixture; live OpenRouter routes remain blocked on B3 ([review](security-reviews/phase-2-model-gateway.md))",
          )

          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "Phase 2 in progress (4/13 tasks complete)",
              "Phase 2 in progress (5/13 tasks complete)",
          )
          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "| RUN-05 | Structured model outputs where feasible | C7 | shared-schemas validation at gateway | AT-RUN-05 (gateway unit) | 2 | Specified |",
              "| RUN-05 | Structured model outputs where feasible | C7 | `ModelGateway` validates caller-supplied Pydantic output schemas with exactly one bounded repair retry; deterministic fixture output is schema-checked | test_RUN_05_01, test_RUN_05_03, test_RUN_05_04 | 2 | Implemented |",
          )
          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "model untrusted envelopes pending | AT-RUN-06 (search/PageFetcher/filing payload, extraction, non-bypass, quarantine, file-safety and non-admission foundations; gateway pending)",
              "ModelGateway recursively rejects identity, firm, billing, letterhead, secret and confidential-matter keys and accepts only task-allowlisted identifiers/admitted content; stage-level untrusted envelopes remain pending | AT-RUN-06 (search/PageFetcher/filing payload, extraction, non-bypass, quarantine, file-safety, gateway payload rejection and non-admission foundations)",
          )
          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "| RUN-07 | Per-report search/page/token/time/retry budgets | C6, C7, C8 | bounded Exa request/result/call/time/body limits plus PageFetcher robots/page size/delay/redirect constraints and filing size/count bounds implemented; report-level budget profile and orchestration pending (QUEUE §8) | AT-RUN-07 (provider bounds/retry foundations) | 2 | Specified |",
              "| RUN-07 | Per-report search/page/token/time/retry budgets | C6, C7, C8 | bounded Exa/PageFetcher/filing limits plus ModelGateway route token ceilings, call-cost ceiling and caller-supplied remaining job budget; orchestration-wide budget profile/stopping rules pending (QUEUE §8) | test_RUN_07_05 plus provider bounds/retry foundations | 2 | In progress |",
          )
          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "| NFR-05 | Every external cost attributable to a report | C7, C8, C15 | bounded company-data call/query counts, Exa call count/reported `costDollars.total`, PageFetcher call count and filing-provider call count returned for later `provider_cost_events`; report attribution/admin view pending | AT-NFR-05 (provider/candidate/search/page-fetch/filing foundations; persistence pending) | 2 | In progress |",
              "| NFR-05 | Every external cost attributable to a report | C7, C8, C15 | provider call counts plus typed `AgentRunRecord` fields for report/job ids, model/provider, tokens, cost and latency; `provider_cost_events`/`agent_runs` persistence and admin view pending | provider foundations + ModelGateway cost/audit tests; persistence pending | 2 | In progress |",
          )
          replace_once(
              "docs/implementation/REQUIREMENTS-TRACEABILITY.md",
              "| NFR-09 | Store model IDs, prompt versions, parameters, evidence | C7, C4 | `agent_runs`, `claims`, `prompt_bundle_version` | AT-NFR-09 | 2 | Specified |",
              "| NFR-09 | Store model IDs, prompt versions, parameters, evidence | C7, C4 | typed `AgentRunRecord` captures model/provider, prompt-bundle version, tokens, cost, latency and ZDR status; `agent_runs` table and evidence links pending next migration | ModelGateway audit-field tests; AT-NFR-09 persistence pending | 2 | In progress |",
          )
          PY
      - name: Commit documentation and remove one-shot workflow
        run: |
          rm .github/workflows/model-gateway-doc-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/worker/README.md docs/implementation/BUILD-CHECKLIST.md docs/implementation/REQUIREMENTS-TRACEABILITY.md .github/workflows/model-gateway-doc-sync.yml
          git commit -m "Document ModelGateway slice"
          git push origin HEAD:agent/phase-2-model-gateway
