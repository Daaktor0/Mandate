name: PageFetcher mypy diagnostic

on:
  pull_request:
    paths:
      - services/worker/mandate_worker/providers/page_fetcher.py
      - services/worker/mandate_worker/providers/__init__.py
      - services/worker/tests/test_page_fetcher.py
      - .github/workflows/page-fetcher-mypy.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: 0.7.19
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Capture exact mypy diagnostics
        run: |
          mkdir -p .diagnostics
          set +e
          uv run mypy services/worker/mandate_worker packages/shared-schemas/python/mandate_schemas scripts/generate_traceability_report.py tests > .diagnostics/page-fetcher-mypy.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> .diagnostics/page-fetcher-mypy.txt
          set -e
      - name: Commit diagnostic output
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .diagnostics/page-fetcher-mypy.txt
          git commit -m "Temporary: capture PageFetcher mypy diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
