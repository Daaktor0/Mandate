name: PageFetcher literal typing repair

on:
  pull_request:
    paths:
      - .github/workflows/page-fetcher-mypy.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: 0.7.19
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Apply exact literal annotation and self-clean
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/worker/mandate_worker/providers/page_fetcher.py")
          content = path.read_text()
          old = 'PAGE_FETCHER_VERSION = "page-fetcher-v1"'
          new = 'PAGE_FETCHER_VERSION: Literal["page-fetcher-v1"] = "page-fetcher-v1"'
          if content.count(old) != 1:
              raise SystemExit("expected PageFetcher version assignment exactly once")
          path.write_text(content.replace(old, new))
          PY
          rm -f .diagnostics/page-fetcher-mypy.txt
          rm -f .github/workflows/page-fetcher-mypy.yml
          uv run ruff check services/worker/mandate_worker/providers/page_fetcher.py
          uv run ruff format --check services/worker/mandate_worker/providers/page_fetcher.py
          uv run mypy services/worker/mandate_worker/providers/page_fetcher.py
          git diff --check
      - name: Commit repair and remove diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix PageFetcher version literal typing"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
