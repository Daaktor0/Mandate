name: Materialize ModelGateway

on:
  push:
    branches:
      - agent/phase-2-model-gateway
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/phase-2-model-gateway
          fetch-depth: 0
      - name: Materialize and verify exact files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p services/worker/mandate_worker/providers services/worker/tests
          cat .agent-materialize/model_gateway/module-part-*.b64 \
            | base64 --decode \
            > services/worker/mandate_worker/providers/model_gateway.py
          cat .agent-materialize/model_gateway/test-part-*.b64 \
            | base64 --decode \
            > services/worker/tests/test_model_gateway.py
          echo '9f3b62ef71f6f0436cfecb913394dc35e7512aa801489e564639b808e79f160b  services/worker/mandate_worker/providers/model_gateway.py' \
            | sha256sum --check --strict
          echo '3aa607d12d53636e6fed838e0e4926986e7e8867c6519fe50365ac7da5b74c08  services/worker/tests/test_model_gateway.py' \
            | sha256sum --check --strict
      - name: Commit permanent source only
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent-materialize
          rm .github/workflows/materialize-model-gateway.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Phase 2: add privacy-bounded ModelGateway'
          git push origin HEAD:agent/phase-2-model-gateway
