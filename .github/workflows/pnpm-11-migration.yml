name: pnpm 11 migration

on:
  pull_request:
    paths:
      - .github/workflows/pnpm-11-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/pnpm-11-audit-repair
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: 0.7.19
      - name: Apply permanent pnpm 11 migration
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text())
          if package.get("packageManager") != "pnpm@10.13.1":
              raise SystemExit("unexpected packageManager pin")
          if package.get("engines", {}).get("pnpm") != "10.13.x":
              raise SystemExit("unexpected pnpm engine pin")
          if package.get("pnpm") != {"overrides": {"postcss": "8.5.10"}}:
              raise SystemExit("unexpected package.json pnpm settings")
          package["packageManager"] = "pnpm@11.13.0"
          package["engines"]["pnpm"] = "11.13.x"
          del package["pnpm"]
          package_path.write_text(json.dumps(package, indent=2) + "\n")

          replacements = {
              Path("Makefile"): (
                  "corepack prepare pnpm@10.13.1 --activate",
                  "corepack prepare pnpm@11.13.0 --activate",
              ),
              Path(".github/workflows/ci.yml"): (
                  "PNPM_VERSION: 10.13.1",
                  "PNPM_VERSION: 11.13.0",
              ),
              Path("tests/test_toolchain_pins.py"): (
                  'self.assertEqual("pnpm@10.13.1", package_json["packageManager"])',
                  'self.assertEqual("pnpm@11.13.0", package_json["packageManager"])',
              ),
          }
          for path, (old, new) in replacements.items():
              content = path.read_text()
              if content.count(old) != 1:
                  raise SystemExit(f"expected one toolchain pin in {path}")
              path.write_text(content.replace(old, new))

          test_path = Path("tests/test_toolchain_pins.py")
          tests = test_path.read_text()
          old_optional = (
              '        self.assertEqual("0.28.1", '
              'package_json["optionalDependencies"]["@esbuild/linux-x64"])\n'
          )
          if tests.count(old_optional) != 1:
              raise SystemExit("unexpected optional-dependency assertion")
          tests = tests.replace(
              old_optional,
              old_optional + '        self.assertNotIn("pnpm", package_json)\n',
          )
          old_build_assertions = (
              '        self.assertEqual(["esbuild"], workspace["onlyBuiltDependencies"])\n'
              '        self.assertEqual(["sharp", "unrs-resolver"], workspace["ignoredBuiltDependencies"])\n'
          )
          new_build_assertions = (
              '        self.assertEqual({"postcss": "8.5.10"}, workspace["overrides"])\n'
              '        self.assertEqual(\n'
              '            {"esbuild": True, "sharp": False, "unrs-resolver": False},\n'
              '            workspace["allowBuilds"],\n'
              '        )\n'
              '        self.assertNotIn("onlyBuiltDependencies", workspace)\n'
              '        self.assertNotIn("ignoredBuiltDependencies", workspace)\n'
          )
          if tests.count(old_build_assertions) != 1:
              raise SystemExit("unexpected build-script assertions")
          test_path.write_text(tests.replace(old_build_assertions, new_build_assertions))

          workspace_path = Path("pnpm-workspace.yaml")
          workspace = workspace_path.read_text()
          old_header = 'packages:\n  - "apps/*"\n  - "packages/*"\n\n'
          if workspace.count(old_header) != 1:
              raise SystemExit("unexpected workspace header")
          workspace = workspace.replace(
              old_header,
              old_header
              + '# Root dependency-resolution override retained from package.json.\n'
              + 'overrides:\n  postcss: "8.5.10"\n\n',
          )
          old_build_settings = (
              '# pnpm 10 blocks dependency lifecycle scripts by default. Esbuild\'s reviewed\n'
              '# installer is required to select the lockfile-pinned native binary for Vitest.\n'
              '# The other currently reported lifecycle scripts are intentionally denied.\n'
              'onlyBuiltDependencies:\n'
              '  - esbuild\n'
              'ignoredBuiltDependencies:\n'
              '  - sharp\n'
              '  - unrs-resolver\n'
          )
          new_build_settings = (
              '# pnpm 11 blocks dependency lifecycle scripts unless explicitly classified.\n'
              '# Esbuild\'s reviewed installer is required for the pinned native binary; the\n'
              '# other currently reported lifecycle scripts remain intentionally denied.\n'
              'allowBuilds:\n'
              '  esbuild: true\n'
              '  sharp: false\n'
              '  unrs-resolver: false\n'
          )
          if workspace.count(old_build_settings) != 1:
              raise SystemExit("unexpected workspace build-script settings")
          workspace_path.write_text(workspace.replace(old_build_settings, new_build_settings))
          PY
      - name: Regenerate lockfile and verify migrated repository
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
          test "$(pnpm --version)" = "11.13.0"
          uv sync --locked --all-groups
          pnpm install --lockfile-only
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm format:check
          pnpm typecheck
          pnpm test
          pnpm audit --audit-level=high
      - name: Remove temporary artifacts and commit
        run: |
          rm -rf .diagnostics
          rm .github/workflows/pnpm-11-migration.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Upgrade pinned pnpm toolchain to 11.13.0"
          git push origin HEAD:agent/pnpm-11-audit-repair
