name: pnpm 11 frozen install diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/pnpm-11-migration.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/pnpm-11-audit-repair
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
      - name: Prepare candidate settings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text())
          package["packageManager"] = "pnpm@11.13.0"
          package["engines"]["pnpm"] = "11.13.x"
          del package["pnpm"]
          package_path.write_text(json.dumps(package, indent=2) + "\n")

          workspace_path = Path("pnpm-workspace.yaml")
          workspace = workspace_path.read_text()
          marker = 'packages:\n  - "apps/*"\n  - "packages/*"\n\n'
          workspace_path.write_text(
              workspace.replace(
                  marker,
                  marker + 'overrides:\n  postcss: "8.5.10"\n\n',
              )
          )
          PY
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Capture lockfile and frozen install output
        run: |
          mkdir -p .diagnostics
          set +e
          pnpm install --lockfile-only > /tmp/lockfile.txt 2>&1
          lock_status=$?
          pnpm install --frozen-lockfile > /tmp/frozen.txt 2>&1
          frozen_status=$?
          {
            printf 'pnpm=%s\n' "$(pnpm --version)"
            printf 'lock_status=%s\n' "$lock_status"
            cat /tmp/lockfile.txt
            printf '\nfrozen_status=%s\n' "$frozen_status"
            cat /tmp/frozen.txt
          } > .diagnostics/pnpm11-frozen-install.txt
          set -e
          git restore package.json pnpm-workspace.yaml pnpm-lock.yaml
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .diagnostics/pnpm11-frozen-install.txt
          git commit -m "Temporary: capture pnpm 11 frozen install"
          git push origin HEAD:agent/pnpm-11-audit-repair
