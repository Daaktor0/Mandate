name: Supabase foundation

on:
  pull_request:
    paths:
      - "supabase/**"
      - "tests/test_supabase_foundation.py"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/supabase-foundation.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "tests/test_supabase_foundation.py"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/supabase-foundation.yml"

permissions:
  contents: read

jobs:
  database:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUPABASE_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Start Postgres 15 and apply migrations
        run: |
          pnpm exec supabase db start
          pnpm exec supabase db reset
      - name: Run NFR-02 and INTAKE-04 database tests
        run: pnpm exec supabase test db --local
      - name: Lint database objects
        run: pnpm exec supabase db lint --local --level error --fail-on error
      - name: Stop local database
        if: always()
        run: pnpm exec supabase stop --no-backup
