name: pnpm 11 lockfile and audit diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/pnpm-audit-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
      - name: Temporarily pin candidate pnpm
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("package.json")
          package = json.loads(path.read_text())
          package["packageManager"] = "pnpm@11.13.0"
          package["engines"]["pnpm"] = "11.13.x"
          path.write_text(json.dumps(package, indent=2) + "\n")
          PY
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
          test "$(pnpm --version)" = "11.13.0"
      - name: Regenerate candidate lockfile and capture audit
        run: |
          mkdir -p .diagnostics
          set +e
          pnpm install --lockfile-only > /tmp/pnpm-install.txt 2>&1
          install_status=$?
          audit_status=99
          pnpm audit --audit-level=high --json > /tmp/pnpm-audit.txt 2>&1
          audit_status=$?
          {
            printf 'candidate_pnpm=%s\n' "$(pnpm --version)"
            printf 'install_status=%s\n' "$install_status"
            cat /tmp/pnpm-install.txt
            printf '\naudit_status=%s\n' "$audit_status"
            cat /tmp/pnpm-audit.txt
          } > .diagnostics/pnpm-audit.txt
          set -e
          git restore package.json pnpm-lock.yaml
      - name: Commit candidate result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .diagnostics/pnpm-audit.txt
          git commit -m "Temporary: test regenerated pnpm 11 lockfile"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
