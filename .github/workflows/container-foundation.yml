name: Container foundation

on:
  pull_request:
    paths:
      - ".dockerignore"
      - "services/worker/**"
      - "packages/shared-schemas/python/**"
      - "infra/compose/**"
      - "scripts/verify_container_runtime.py"
      - "tests/test_container_foundation.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/container-foundation.yml"
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - "services/worker/**"
      - "packages/shared-schemas/python/**"
      - "infra/compose/**"
      - "scripts/verify_container_runtime.py"
      - "tests/test_container_foundation.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/container-foundation.yml"

permissions:
  contents: read

jobs:
  containers:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up pinned Docker Engine
        uses: docker/setup-docker-action@v5
        with:
          version: v27.5.1
      - name: Verify Docker toolchain
        run: |
          test "$(docker version --format '{{.Server.Version}}')" = "27.5.1"
          docker compose version
          docker compose --file infra/compose/local.yml config --quiet
      - name: Build NFR-03 worker and SEC-05 renderer images
        run: docker compose --file infra/compose/local.yml build --pull
      - name: Start the staging-shaped stack
        run: docker compose --file infra/compose/local.yml up --detach --wait --wait-timeout 180
      - name: Verify live NFR-03 and SEC-05 runtime boundaries
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8081/health
          docker compose --file infra/compose/local.yml exec --no-TTY renderer \
            python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health', timeout=2).read()"
          python3 scripts/verify_container_runtime.py
      - name: Collect container logs
        if: always()
        run: docker compose --file infra/compose/local.yml logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose --file infra/compose/local.yml down --remove-orphans
