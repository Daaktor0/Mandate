name: ModelGateway diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Patch traceability acceptance tag
        shell: python
        run: |
          from pathlib import Path
          path = Path('docs/implementation/REQUIREMENTS-TRACEABILITY.md')
          text = path.read_text(encoding='utf-8')
          old = '| test_RUN_05_01, test_RUN_05_03, test_RUN_05_04 | 2 | Implemented |'
          new = '| AT-RUN-05 (test_RUN_05_01, test_RUN_05_03, test_RUN_05_04) | 2 | Implemented |'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one RUN-05 acceptance cell')
          path.write_text(text.replace(old, new), encoding='utf-8')
      - name: Upload patched matrix
        uses: actions/upload-artifact@v4
        with:
          name: patched-traceability
          path: docs/implementation/REQUIREMENTS-TRACEABILITY.md
          retention-days: 1
