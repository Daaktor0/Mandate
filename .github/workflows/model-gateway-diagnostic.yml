name: ModelGateway diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: '0.7.19'
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups
      - name: Run focused suite with compact failure output
        shell: bash
        run: |
          set +e
          uv run pytest -q services/worker/tests/test_model_gateway.py services/worker/tests/test_demo_mode.py > /tmp/model-gateway-pytest.log 2>&1
          status=$?
          tail -n 180 /tmp/model-gateway-pytest.log
          exit "$status"
