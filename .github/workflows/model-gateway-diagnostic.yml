name: ModelGateway diagnostic

on:
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: 0.7.19

jobs:
  python-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --all-groups
      - name: Capture checks
        run: |
          set +e
          uv run ruff check services/worker scripts tests packages/shared-schemas/python --output-format=concise > /tmp/ruff-check.txt 2>&1
          echo $? > /tmp/ruff-check.exit
          uv run ruff format --check --diff services/worker scripts tests packages/shared-schemas/python > /tmp/ruff-format.diff 2>&1
          echo $? > /tmp/ruff-format.exit
          uv run mypy services/worker/mandate_worker packages/shared-schemas/python/mandate_schemas scripts/generate_traceability_report.py tests > /tmp/mypy.txt 2>&1
          echo $? > /tmp/mypy.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: model-gateway-diagnostic
          path: /tmp/ruff-*
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: model-gateway-mypy
          path: /tmp/mypy*
          retention-days: 1
