name: Finalize ModelGateway branch

on:
  push:
    branches:
      - agent/phase-2-model-gateway
  workflow_dispatch:

concurrency:
  group: finalize-model-gateway
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/phase-2-model-gateway
          fetch-depth: 0
      - name: Apply traceability correction and remove temporary workflow
        shell: python
        run: |
          from pathlib import Path
          path = Path('docs/implementation/REQUIREMENTS-TRACEABILITY.md')
          text = path.read_text(encoding='utf-8')
          old = '| test_RUN_05_01, test_RUN_05_03, test_RUN_05_04 | 2 | Implemented |'
          new = '| AT-RUN-05 (test_RUN_05_01, test_RUN_05_03, test_RUN_05_04) | 2 | Implemented |'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one RUN-05 acceptance cell')
          path.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/model-gateway-diagnostic.yml').unlink()
      - name: Commit final permanent branch state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/implementation/REQUIREMENTS-TRACEABILITY.md .github/workflows/model-gateway-diagnostic.yml
          git commit -m 'Fix ModelGateway traceability acceptance evidence'
          git push origin HEAD:agent/phase-2-model-gateway
