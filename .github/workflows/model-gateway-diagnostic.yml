name: ModelGateway diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.16.0'
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: '0.7.19'
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Run full unit command with compact failure output
        shell: bash
        run: |
          set +e
          pnpm test > /tmp/mandate-unit.log 2>&1
          status=$?
          tail -n 220 /tmp/mandate-unit.log
          exit "$status"
