name: Temporary corrected ER source artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Generate corrected source
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/worker/mandate_worker/entity_resolution/candidates.py")
          text = path.read_text(encoding="utf-8")
          old = """        (brand for brand in candidate.brand_names or () if brand.casefold() == requested.casefold()),
"""
          new = """        (
            brand
            for brand in candidate.brand_names or ()
            if brand.casefold() == requested.casefold()
        ),
"""
          if text.count(old) != 1:
              raise SystemExit("brand formatting anchor missing or duplicated")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Upload corrected source
        uses: actions/upload-artifact@v4
        with:
          name: corrected-candidates-py
          path: services/worker/mandate_worker/entity_resolution/candidates.py
          retention-days: 1
