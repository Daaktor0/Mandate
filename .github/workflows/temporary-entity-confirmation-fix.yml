name: Temporary entity confirmation invariant fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  NODE_VERSION: 22.16.0
  PNPM_VERSION: 10.13.1
  PYTHON_VERSION: "3.12"
  UV_VERSION: 0.7.19

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Apply invariant-safe refinement fix
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def rewrite(path: str, pattern: str, replacement: str, label: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              file.write_text(updated, encoding="utf-8")
              print(f"updated {label}")

          migration = "supabase/migrations/20260714090000_entity_confirmation.sql"
          rewrite(
              migration,
              r"alter table public\.report_requests\s+drop constraint report_requests_exactly_one_input;.*?comment on column public\.report_requests\.input_state_hint is\s+'Optional public registered-office state supplied only to refine ambiguous entity resolution\.';",
              """alter table public.report_requests
            add column resolution_legal_name_hint text null
              check (
                resolution_legal_name_hint is null
                or char_length(resolution_legal_name_hint) between 1 and 300
              ),
            add column resolution_cin_hint text null
              check (
                resolution_cin_hint is null
                or resolution_cin_hint ~ '^[UL][0-9]{5}[A-Z]{2}[0-9]{4}[A-Z]{3}[0-9]{6}$'
              ),
            add column resolution_state_hint text null
              check (
                resolution_state_hint is null
                or char_length(resolution_state_hint) between 1 and 100
              );

          comment on column public.report_requests.resolution_legal_name_hint is
            'Optional public legal-name refinement; the immutable original intake field remains unchanged.';
          comment on column public.report_requests.resolution_cin_hint is
            'Optional public CIN refinement; the immutable original intake field remains unchanged.';
          comment on column public.report_requests.resolution_state_hint is
            'Optional public registered-office state supplied only to refine ambiguous entity resolution.';""",
              "migration hint columns",
          )
          rewrite(
              migration,
              r"update public\.report_requests\s+set confirmed_entity_id = null,\s+related_entity_ids = '\{\}'::uuid\[\],\s+state = 'draft'\s+where id = p_report_request_id;",
              """update public.report_requests
                 set resolution_legal_name_hint = null,
                     resolution_cin_hint = null,
                     resolution_state_hint = null,
                     confirmed_entity_id = null,
                     related_entity_ids = '{}'::uuid[],
                     state = 'draft'
               where id = p_report_request_id;""",
              "none-of-these hint clearing",
          )
          rewrite(
              migration,
              r"update public\.report_requests\s+set input_legal_name = coalesce\(btrim\(p_legal_name\), input_legal_name\),\s+input_cin = coalesce\(upper\(btrim\(p_cin\)\), input_cin\),\s+input_state_hint = case when p_state is null then input_state_hint else btrim\(p_state\) end,\s+confirmed_entity_id = null,\s+related_entity_ids = '\{\}'::uuid\[\],\s+state = 'draft'\s+where id = p_report_request_id;",
              """update public.report_requests
                 set resolution_legal_name_hint = case
                       when p_legal_name is null then resolution_legal_name_hint
                       else btrim(p_legal_name)
                     end,
                     resolution_cin_hint = case
                       when p_cin is null then resolution_cin_hint
                       else upper(btrim(p_cin))
                     end,
                     resolution_state_hint = case
                       when p_state is null then resolution_state_hint
                       else btrim(p_state)
                     end,
                     confirmed_entity_id = null,
                     related_entity_ids = '{}'::uuid[],
                     state = 'draft'
               where id = p_report_request_id;""",
              "refine hint update",
          )

          db_test = "supabase/tests/database/entity_confirmation.test.sql"
          rewrite(
              db_test,
              r"select input_url = 'https://example\.invalid'\s+and input_legal_name = 'Refined Website Operator Private Limited'\s+and input_cin = 'U62099MH2024PTC999999'\s+and input_state_hint = 'Maharashtra'\s+and state = 'resolving_entity'",
              """select input_url = 'https://example.invalid'
                and input_legal_name is null
                and input_cin is null
                and resolution_legal_name_hint = 'Refined Website Operator Private Limited'
                and resolution_cin_hint = 'U62099MH2024PTC999999'
                and resolution_state_hint = 'Maharashtra'
                and state = 'resolving_entity'""",
              "database hint assertion",
          )
          rewrite(
              db_test,
              r"'ENTITY-04 a website request can retain its URL and add public identity hints'\s+\);\s+select is\(\s+\(\s+select count\(\*\)::integer\s+from public\.outbox",
              """'ENTITY-04 refinement preserves original intake and stores separate public identity hints'
          );

          reset role;

          select is(
            (
              select count(*)::integer
                from public.outbox""",
              "database role boundary",
          )
          rewrite(
              db_test,
              r"\nreset role;\s+\nselect \* from finish\(\);",
              "\nselect * from finish();",
              "remove duplicate role reset",
          )

          task = "services/worker/mandate_worker/entity_resolution/task.py"
          rewrite(
              task,
              r"input_cin: str \| None = None\s+state: Literal\[\"resolving_entity\"\]",
              """input_cin: str | None = None
              resolution_state_hint: str | None = Field(default=None, min_length=1, max_length=100)
              state: Literal[\"resolving_entity\"]""",
              "resolution request state hint",
          )
          rewrite(
              task,
              r"select id, user_id, input_kind::text, input_url, input_legal_name,\s+input_cin, state::text",
              """select id, user_id, input_kind::text, input_url,
                             coalesce(resolution_legal_name_hint, input_legal_name) as input_legal_name,
                             coalesce(resolution_cin_hint, input_cin) as input_cin,
                             resolution_state_hint, state::text""",
              "effective refinement select",
          )
          rewrite(
              task,
              r"supplied_cin=request\.input_cin,\s+site_inspection=inspection,",
              """supplied_cin=request.input_cin,
                      supplied_state=request.resolution_state_hint,
                      site_inspection=inspection,""",
              "pass state hint to generator",
          )

          candidates = "services/worker/mandate_worker/entity_resolution/candidates.py"
          rewrite(
              candidates,
              r"supplied_cin: str \| None = None,\s+site_inspection: SiteInspection \| None = None,",
              """supplied_cin: str | None = None,
                  supplied_state: str | None = None,
                  site_inspection: SiteInspection | None = None,""",
              "generator state parameter",
          )
          rewrite(
              candidates,
              r"\n        scored = \[",
              """
                  if supplied_state is not None:
                      state_key = _normalised_state(supplied_state)
                      aggregates = {
                          cin: aggregate
                          for cin, aggregate in aggregates.items()
                          if aggregate.record.registered_office_state is not None
                          and _normalised_state(aggregate.record.registered_office_state) == state_key
                      }

                  scored = [""",
              "state hint filtering",
          )
          rewrite(
              candidates,
              r"\ndef _normalised_name\(value: str\) -> str:",
              """
          def _normalised_state(value: str) -> str:
              state = \" \".join(value.split()).casefold()
              if not state or len(state) > 100:
                  raise ValueError(\"registered-office state is empty or too long\")
              return state


          def _normalised_name(value: str) -> str:""",
              "state normalisation",
          )

          scoring_test = Path("services/worker/tests/test_candidate_scoring.py")
          scoring_text = scoring_test.read_text(encoding="utf-8")
          if "test_ENTITY_04_registered_office_state_hint_filters_ambiguous_results" not in scoring_text:
              scoring_text += """

          @pytest.mark.asyncio
          async def test_ENTITY_04_registered_office_state_hint_filters_ambiguous_results() -> None:
              maharashtra = company_record()
              delhi = company_record(
                  cin=PUBLIC_CIN,
                  legal_name=maharashtra.legal_name,
                  state=\"Delhi\",
                  address=\"1 Synthetic Avenue, New Delhi, Delhi 110001\",
              )
              provider = FixtureProvider(
                  searches={name_key(maharashtra.legal_name): (maharashtra, delhi)}
              )

              result = await EntityCandidateGenerator(provider).generate(
                  report_request_id=REQUEST_ID,
                  supplied_legal_name=maharashtra.legal_name,
                  supplied_state=\"  Maharashtra  \",
              )

              assert [candidate.cin for candidate in result.candidates] == [PRIVATE_CIN]
          """
              scoring_test.write_text(scoring_text, encoding="utf-8")

          task_test = Path("services/worker/tests/test_entity_resolution_task.py")
          task_text = task_test.read_text(encoding="utf-8")
          if "test_ENTITY_04_postgres_repository_reads_effective_refinement_hints" not in task_text:
              test = """

          @pytest.mark.asyncio
          async def test_ENTITY_04_postgres_repository_reads_effective_refinement_hints() -> None:
              cin = \"U62099MH2024PTC123456\"
              database = RecordingDatabase(
                  [
                      {
                          \"id\": REQUEST_ID,
                          \"user_id\": USER_ID,
                          \"input_kind\": \"website\",
                          \"input_url\": \"https://company.example/\",
                          \"input_legal_name\": \"Refined Company Private Limited\",
                          \"input_cin\": cin,
                          \"resolution_state_hint\": \"Maharashtra\",
                          \"state\": \"resolving_entity\",
                      }
                  ]
              )
              repository = PostgresResolutionRepository(database)

              request = await repository.load_request(REQUEST_ID, USER_ID)

              assert request is not None
              assert request.input_legal_name == \"Refined Company Private Limited\"
              assert request.input_cin == cin
              assert request.resolution_state_hint == \"Maharashtra\"
              statement, parameters = database.calls[0]
              assert \"coalesce(resolution_legal_name_hint, input_legal_name)\" in statement
              assert \"coalesce(resolution_cin_hint, input_cin)\" in statement
              assert parameters == (REQUEST_ID, USER_ID)
          """
              anchor = "\n\n@pytest.mark.asyncio\nasync def test_ENTITY_02_postgres_repository_uses_atomic_completion_function"
              if anchor not in task_text:
                  raise SystemExit("task test insertion anchor missing")
              task_test.write_text(task_text.replace(anchor, test + anchor, 1), encoding="utf-8")

          structural = "tests/test_entity_confirmation_migration.py"
          rewrite(
              structural,
              r"assert \"delete from public\.entity_candidates\" in sql",
              """assert \"delete from public.entity_candidates\" in sql
              assert \"resolution_legal_name_hint\" in sql
              assert \"resolution_cin_hint\" in sql
              assert \"resolution_state_hint\" in sql
              assert \"drop constraint report_requests_exactly_one_input\" not in sql""",
              "structural intake invariant assertions",
          )

          for workflow in (
              Path(".github/workflows/temporary-db-diagnostics.yml"),
              Path(".github/workflows/temporary-entity-confirmation-fix.yml"),
          ):
              workflow.unlink(missing_ok=True)
          PY
      - name: Apply pinned formatters
        run: |
          uv run ruff format services/worker tests
      - name: Commit fixes
        run: |
          git config user.name "mandate-fix-bot"
          git config user.email "mandate-fix-bot@users.noreply.github.com"
          git add --all
          git commit -m "fix: preserve intake invariants during entity refinement"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
