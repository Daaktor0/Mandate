name: Ruff diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Ruff
        run: python -m pip install --quiet ruff==0.12.12
      - name: Ruff lint
        run: ruff check services/worker scripts tests packages/shared-schemas/python --output-format=concise
      - name: Ruff format diff
        run: ruff format --check --diff services/worker scripts tests packages/shared-schemas/python
