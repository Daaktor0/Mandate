name: PageFetcher format repair

on:
  pull_request:
    paths:
      - services/worker/mandate_worker/providers/page_fetcher.py
      - services/worker/mandate_worker/providers/__init__.py
      - services/worker/tests/test_page_fetcher.py
      - .github/workflows/page-fetcher-format.yml

permissions:
  contents: write

concurrency:
  group: page-fetcher-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: 0.7.19
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Apply Ruff import and format output
        run: |
          uv run ruff check --fix --select I \
            services/worker/mandate_worker/providers/page_fetcher.py \
            services/worker/mandate_worker/providers/__init__.py \
            services/worker/tests/test_page_fetcher.py
          uv run ruff format \
            services/worker/mandate_worker/providers/page_fetcher.py \
            services/worker/mandate_worker/providers/__init__.py \
            services/worker/tests/test_page_fetcher.py
          git diff --check
      - name: Commit exact formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            services/worker/mandate_worker/providers/page_fetcher.py \
            services/worker/mandate_worker/providers/__init__.py \
            services/worker/tests/test_page_fetcher.py
          git commit -m "Apply project Ruff formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
