name: Temporary branch formatter

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  NODE_VERSION: 22.16.0
  PNPM_VERSION: 10.13.1
  PYTHON_VERSION: "3.12"
  UV_VERSION: 0.7.19

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Apply repository formatters
        run: |
          pnpm exec prettier --write package.json pnpm-workspace.yaml tsconfig.base.json apps/web packages/shared-schemas
          uv run ruff format services/worker scripts tests packages/shared-schemas/python
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "mandate-format-bot"
          git config user.email "mandate-format-bot@users.noreply.github.com"
          git add --all
          git commit -m "chore: apply pinned formatters"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
