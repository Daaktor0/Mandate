name: Worker foundation

on:
  pull_request:
    paths:
      - "services/worker/**"
      - "packages/shared-schemas/python/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/worker-foundation.yml"
  push:
    branches: [main]
    paths:
      - "services/worker/**"
      - "packages/shared-schemas/python/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/worker-foundation.yml"

permissions:
  contents: read

jobs:
  worker:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Lint and format
        run: |
          uv run ruff check services/worker
          uv run ruff format --check services/worker
      - name: Typecheck worker
        run: uv run mypy services/worker/mandate_worker
      - name: Run NFR-01, NFR-03 and NFR-04 worker tests
        run: uv run pytest -q services/worker/tests
