name: Temporary ER cleanup fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply multiline brand iterator and clean temporary workflows
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/worker/mandate_worker/entity_resolution/candidates.py")
          text = path.read_text(encoding="utf-8")
          old = """        (brand for brand in candidate.brand_names or () if brand.casefold() == requested.casefold()),
"""
          new = """        (
            brand
            for brand in candidate.brand_names or ()
            if brand.casefold() == requested.casefold()
        ),
"""
          if text.count(old) != 1:
              raise SystemExit("brand formatting anchor missing or duplicated")
          path.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/temporary-fix-er-format.yml").unlink(missing_ok=True)
          Path(".github/workflows/temporary-quality-diagnostics.yml").unlink(missing_ok=True)
          PY
      - name: Commit cleanup
        run: |
          git config user.name "mandate-er-fixture-bot"
          git config user.email "mandate-er-fixture-bot@users.noreply.github.com"
          git add --all
          git commit -m "style: wrap optional brand iterator"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
