name: Temporary Prettier diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  NODE_VERSION: 22.16.0
  PNPM_VERSION: 10.13.1

jobs:
  prettier-diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Capture exact CSS formatting patch
        run: |
          pnpm exec prettier --write apps/web/app/globals.css
          git diff -- apps/web/app/globals.css > /tmp/globals-css.patch
      - name: Upload CSS formatting patch
        uses: actions/upload-artifact@v4
        with:
          name: globals-css-prettier-patch
          path: /tmp/globals-css.patch
          if-no-files-found: error
          retention-days: 1
