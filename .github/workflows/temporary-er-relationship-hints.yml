name: Temporary ER relationship implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: 0.7.19

jobs:
  implement:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Apply relationship implementation
        run: uv run python scripts/temporary_apply_er_relationship_hints.py
      - name: Remove temporary automation
        run: rm scripts/temporary_apply_er_relationship_hints.py .github/workflows/temporary-er-relationship-hints.yml
      - name: Format and verify focused suite
        run: |
          uv run ruff format services/worker/mandate_worker/entity_resolution services/worker/tests/test_entity_resolution_acceptance_fixtures.py
          uv run ruff check services/worker/mandate_worker/entity_resolution services/worker/tests/test_entity_resolution_acceptance_fixtures.py
          uv run pytest -q services/worker/tests/test_entity_resolution_acceptance_fixtures.py services/worker/tests/test_candidate_scoring.py
      - name: Commit implementation
        run: |
          git config user.name "mandate-er-fixture-bot"
          git config user.email "mandate-er-fixture-bot@users.noreply.github.com"
          git add --all
          git commit -m "feat: complete deterministic entity-resolution fixture suite"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
