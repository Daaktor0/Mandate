name: Bootstrap shared-schema slice

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.event.pull_request.head.ref == 'agent/phase-0-shared-schemas'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
      - name: Bootstrap dependencies and lockfiles
        run: |
          pnpm install --no-frozen-lockfile
          uv sync --all-groups
      - name: Normalize authored sources
        run: |
          pnpm exec prettier --write package.json pnpm-workspace.yaml tsconfig.base.json apps/web packages/shared-schemas
          uv run ruff check --fix scripts tests packages/shared-schemas/python
          uv run ruff format scripts tests packages/shared-schemas/python
      - name: Regenerate contracts
        run: python3 scripts/generate_schemas.py
      - name: Commit bootstrap outputs
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/web packages/shared-schemas scripts tests pnpm-lock.yaml uv.lock
          git commit -m "chore(RUN-05): normalize contracts and lock dependencies"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Verify locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Check schema drift
        run: pnpm schemas:check
      - name: Lint
        run: pnpm lint
      - name: Check formatting
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
