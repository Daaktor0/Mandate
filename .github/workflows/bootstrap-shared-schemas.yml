name: Bootstrap shared-schema slice

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.event.pull_request.head.ref == 'agent/phase-0-shared-schemas'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
      - name: Normalize authored sources
        run: |
          uv run ruff check --fix scripts tests packages/shared-schemas/python
          uv run ruff format scripts tests packages/shared-schemas/python
      - name: Generate lockfiles
        run: |
          pnpm install --lockfile-only --no-frozen-lockfile
          uv lock
      - name: Commit bootstrap outputs
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts tests packages/shared-schemas/python pnpm-lock.yaml uv.lock
          git commit -m "chore(RUN-05): normalize schemas and lock dependencies"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Capture complete baseline
        id: baseline
        shell: bash
        run: |
          set +e
          pnpm check > shared-schema-baseline.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit baseline diagnostic
        if: steps.baseline.outputs.status != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shared-schema-baseline.log
          git commit -m "test(RUN-05): capture shared-schema baseline failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Enforce complete baseline
        if: steps.baseline.outputs.status != '0'
        run: |
          cat shared-schema-baseline.log
          exit 1
