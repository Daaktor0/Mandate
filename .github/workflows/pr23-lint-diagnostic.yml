name: PR23 lint diagnostic

on:
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: 22.16.0
  PNPM_VERSION: 10.13.1
  PYTHON_VERSION: "3.12"
  UV_VERSION: 0.7.19

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --locked --all-groups
      - name: Capture exact checks
        shell: bash
        run: |
          set +e
          : > diagnostic.txt
          for command in \
            "pnpm --filter @mandate/web lint" \
            "uv run ruff check services/worker scripts tests packages/shared-schemas/python" \
            "pnpm exec prettier --check package.json pnpm-workspace.yaml tsconfig.base.json apps/web packages/shared-schemas" \
            "uv run ruff format --check --diff services/worker scripts tests packages/shared-schemas/python"
          do
            printf '\n===== %s =====\n' "$command" >> diagnostic.txt
            bash -lc "$command" >> diagnostic.txt 2>&1
            printf '\nEXIT=%s\n' "$?" >> diagnostic.txt
          done
          cat diagnostic.txt
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr23-lint-diagnostic
          path: diagnostic.txt
          if-no-files-found: error
          retention-days: 1
