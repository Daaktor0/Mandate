name: Temporary ER fixture traceability promotion

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Promote tested ER fixture slice
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:100]}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          build = "docs/implementation/BUILD-CHECKLIST.md"
          replace_once(
              build,
              "> **Current phase:** 1 — Entity-resolution proof of concept (7/9 tasks complete) · **Last gate passed:** G0 · **Updated:** 2026-07-14",
              "> **Current phase:** 1 — Entity-resolution proof of concept (8/9 tasks complete) · **Last gate passed:** G0 · **Updated:** 2026-07-14",
          )
          replace_once(
              build,
              "- [ ] ER-01..11 fixture suite green",
              "- [x] ER-01..11 fixture suite green ([review](security-reviews/phase-1-er-fixture-suite.md))",
          )

          trace = "docs/implementation/REQUIREMENTS-TRACEABILITY.md"
          replace_once(
              trace,
              "**Status:** Phase 1 in progress (7/9 tasks complete); `NFR-03` is `Verified`; `INTAKE-01`, `INTAKE-03`, `INTAKE-05`, `ENTITY-02`, `ENTITY-03`, `ENTITY-04` and `ENTITY-05` are `Implemented`; `NFR-01`, `NFR-02`, `NFR-04`, `NFR-05`, `INTAKE-02`, `INTAKE-04`, `INTAKE-06`, `ENTITY-01`, `ENTITY-07` and `RUN-06` are `In progress`; all other requirements remain `Specified`",
              "**Status:** Phase 1 in progress (8/9 tasks complete); `NFR-03` is `Verified`; `INTAKE-01`, `INTAKE-03`, `INTAKE-05`, `ENTITY-01`, `ENTITY-02`, `ENTITY-03`, `ENTITY-04`, `ENTITY-05` and `ENTITY-07` are `Implemented`; `NFR-01`, `NFR-02`, `NFR-04`, `NFR-05`, `INTAKE-02`, `INTAKE-04`, `INTAKE-06` and `RUN-06` are `In progress`; all other requirements remain `Specified`",
          )
          replace_once(
              trace,
              "| INTAKE-03 | Reject localhost/private/malformed/unsupported URLs | C2, C9 | `intake/url-policy.ts`; `mandate_worker.fetch.SafeFetcher` DNS/IP-pinned transport | AT-INTAKE-03 (preflight + pinned transport), SEC-03 (URL/IP/redirect/rebinding/budget table), ER-11 (crawler fixture pending) | 1 | Implemented |",
              "| INTAKE-03 | Reject localhost/private/malformed/unsupported URLs | C2, C9 | `intake/url-policy.ts`; `mandate_worker.fetch.SafeFetcher` DNS/IP-pinned transport | AT-INTAKE-03 (preflight + pinned transport), SEC-03 (URL/IP/redirect/rebinding/budget table), ER-11 (private-IP redirect limitation and public-source recovery) | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| INTAKE-05 | CIN optional | C1, C2 | generated contract; `report_requests.input_cin`; route/RPC | AT-INTAKE-05 (route + DB), ER-01 (pending) | 1 | Implemented |",
              "| INTAKE-05 | CIN optional | C1, C2 | generated contract; `report_requests.input_cin`; route/RPC | AT-INTAKE-05 (route + DB), ER-01 (exact CIN on controlled domain) | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| ENTITY-01 | Inspect website legal pages and disclosures | C6 (resolve stage), C9 | typed `LegalPageCrawler`/`PageInspection`; Evidence persistence and sandboxed PDF inspection pending | AT-ENTITY-01 (priority/robots/extraction), ER-02/10/11 foundations; full ER suite pending | 1 | In progress |",
              "| ENTITY-01 | Inspect website legal pages and disclosures | C6 (resolve stage), C9 | typed `LegalPageCrawler`/`PageInspection`; bounded priority discovery, robots handling, disclosure extraction, hidden-markup/script stripping, injection suspicion and stable fetch limitations | AT-ENTITY-01 (priority/robots/extraction), ER-01..11 deterministic website/registry suite | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| ENTITY-02 | Candidates with supporting evidence | C6, C4 | typed `EntityCandidateGenerator`; generated `EntityCandidate`; atomic `entities`/`entity_candidates` persistence with evidence ids + factor audit | AT-ENTITY-02 (verbatim scoring/evidence/dedupe/persistence); ER-01/02/05/06/07/09/10 foundations | 1 | Implemented |",
              "| ENTITY-02 | Candidates with supporting evidence | C6, C4 | typed `EntityCandidateGenerator`; generated `EntityCandidate`; atomic `entities`/`entity_candidates` persistence with evidence ids + factor audit; typed public-evidence relationship hints cannot affect scoring | AT-ENTITY-02 (verbatim scoring/evidence/dedupe/persistence), ER-01..11 deterministic suite | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| ENTITY-04 | Ask for legal name/CIN when uncertain | C1, C2, C4 | typed `legal_name_or_cin_required`; no-match/exhaustion → `failed_no_charge`; none/refine UI/API; immutable intake plus separate public identity hints; retryable draft/failed recovery; state hint consumed by worker | AT-ENTITY-04 (no-match/no-charge/retry/API/UI), ER-09 foundation; full ER fixture pending | 1 | Implemented |",
              "| ENTITY-04 | Ask for legal name/CIN when uncertain | C1, C2, C4 | typed `legal_name_or_cin_required`; no-match/exhaustion → `failed_no_charge`; none/refine UI/API; immutable intake plus separate public identity hints; retryable draft/failed recovery; state hint consumed by worker | AT-ENTITY-04 (no-match/no-charge/retry/API/UI), ER-09 no-disclosure outcome | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| ENTITY-05 | CIN as exact identifier; compatible master-data sources | C8 (CompanyDataProvider), C4 | typed provider + deterministic fixture + flagged Attestr adapter; `entities.cin` unique and CIN-first identity key | AT-ENTITY-05 (provider/CIN/database identity); ER-01 foundation; live B5 gate is phase exit evidence | 1 | Implemented |",
              "| ENTITY-05 | CIN as exact identifier; compatible master-data sources | C8 (CompanyDataProvider), C4 | typed provider + deterministic registry fixtures + flagged Attestr adapter; `entities.cin` unique and CIN-first identity key | AT-ENTITY-05 (provider/CIN/database identity), ER-01 exact-identifier case; live B5 gate remains phase-exit evidence | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| ENTITY-07 | Explain and confirm multi-entity scope | C1, C2, C4, C6 | optional related-entity UI; strict confirm payload; `related_entity_ids` unique and ≤2; primary excluded; only explicitly proposed entities with a materiality reason accepted; upstream reason generation pending ER/GC fixtures | AT-ENTITY-07 (schema/UI/database scope controls), GC-14 pending | 1 | In progress |",
              "| ENTITY-07 | Explain and confirm multi-entity scope | C1, C2, C4, C6 | typed public-evidence relationship hints; optional related-entity UI; strict confirm payload; `related_entity_ids` unique and ≤2; primary excluded; only explicitly proposed entities with a materiality reason accepted | AT-ENTITY-07 (relationship-hint validation, score isolation, schema/UI/database scope controls), ER-04 parent/opco case | 1 | Implemented |",
          )
          replace_once(
              trace,
              "| RUN-06 | Fetched content treated as untrusted | C9, C6 | deterministic script/hidden-markup stripping and `prompt_injection_suspected`; model untrusted envelopes pending | AT-RUN-06 (gateway pending), SEC-04/ER-10 crawler foundation | 2 | In progress |",
              "| RUN-06 | Fetched content treated as untrusted | C9, C6 | deterministic script/hidden-markup stripping and `prompt_injection_suspected`; model untrusted envelopes pending | AT-RUN-06 (gateway pending), SEC-04 and ER-10 malicious-page acceptance green | 2 | In progress |",
          )

          review = "docs/implementation/security-reviews/phase-1-er-fixture-suite.md"
          replace_once(
              review,
              "## Review status\n\nImplementation review is in progress and remains gated on the complete repository CI. The fixture corpus is synthetic, uses reserved `.example` domains, contains no credentials or live company data, and runs through the same bounded crawler and candidate generator used by the Phase 1 proof of concept.",
              "## Result\n\nNo open implementation or security deviation was found in this slice. GitHub Actions CI run #88 passed lint/format/typechecking, full-history secret and dependency/container scans, generated-schema drift, all unit suites including ER-01 through ER-11, a clean ephemeral Supabase/Postgres reset with pgTAP/database lint, staging-shaped worker/renderer health and isolation checks, and the requirements-traceability report. The fixture corpus is synthetic, uses reserved `.example` domains, contains no credentials or live company data, and runs through the same bounded crawler and candidate generator used by the Phase 1 proof of concept.",
          )

          Path(".github/workflows/temporary-er-traceability-update.yml").unlink()
          PY
      - name: Commit promotion
        run: |
          git config user.name "mandate-docs-bot"
          git config user.email "mandate-docs-bot@users.noreply.github.com"
          git add --all
          git commit -m "docs: mark ER fixture suite complete"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
