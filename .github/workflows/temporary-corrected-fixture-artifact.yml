name: Temporary corrected ER fixture artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Correct ER-06 expectation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("fixtures/entity-resolution/cases.json")
          text = path.read_text(encoding="utf-8")
          old = '"U74999MH2019PTC100006": "ambiguous"'
          new = '"U74999MH2019PTC100006": "insufficient_evidence"'
          if text.count(old) != 1:
              raise SystemExit("ER-06 expectation anchor missing or duplicated")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Upload corrected fixture
        uses: actions/upload-artifact@v4
        with:
          name: corrected-er-fixtures
          path: fixtures/entity-resolution/cases.json
          retention-days: 1
